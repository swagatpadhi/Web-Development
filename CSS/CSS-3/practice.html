<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
    <style>
        #outerDiv{
            height: 200px;
            width: 70px;
            border: 2px solid black;
        }
        .innerDiv{
            height: 50px;
            width: 50px;
            border: 2px solid black;
            margin: 10px;
            border-radius: 50%;
        }
        #d1{
            background-color: red;
        }
        #d2{
            background-color: yellow;
        }
        #d3{
            background-color: green;;
        }
    </style>
</head>
<body>
    <div id="outerDiv">
        <div class="innerDiv" id="d1"></div>
        <div class="innerDiv" id="d2"></div>
        <div class="innerDiv" id="d3"></div>
    </div>
</body>
</html>
